name: phylofetch
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip
  # Bioinformatics tools
  - bioconda::itsx=1.1.3
  - bioconda::blast=2.14.0
  - bioconda::mafft=7.520
  - bioconda::trimal=1.4.1
  - bioconda::iqtree=2.2.6
  # Python packages via conda
  - biopython>=1.81
  - pandas>=2.0
  - numpy>=1.24
  - matplotlib>=3.7
  # Streamlit and extras via pip
  - pip:
    - streamlit>=1.28
    - plotly>=5.0
    - pymsaviz>=0.4
    - pytest>=7.0
    - pytest-cov>=4.0
    - -e .
